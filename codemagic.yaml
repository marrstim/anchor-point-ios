workflows:
  ios-app-store:
    name: Anchor Point — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: App Store Connect API Key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: co.anchorestates
      vars:
        BUNDLE_ID: "co.anchorestates"
        APP_STORE_APPLE_ID: ""   # set to the numeric App Store Connect app ID once listing is created
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Bump build number
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          cd $CM_BUILD_DIR
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --project "AnchorPoint.xcodeproj" \
            --scheme "AnchorPoint"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Uncomment once the App Store listing is filled in and you're ready to submit for review:
        # submit_to_app_store: true
        # release_type: AFTER_APPROVAL
