workflows:
  ios-app-store:
    name: Anchor Point — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: App Store Connect API Key
    environment:
      vars:
        BUNDLE_ID: "co.anchorestates"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Set up code signing
        script: |
          keychain initialize
          # Generate a fresh private key for the distribution certificate.
          # NOTE: Apple caps distribution certs at 2. If this build fails with a 409
          # "already have a current Distribution certificate" error, revoke stale
          # certs at developer.apple.com/account/resources/certificates/list and retry.
          openssl genrsa -out /tmp/apple_cert_priv.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@file:/tmp/apple_cert_priv.pem
          keychain add-certificates
          xcode-project use-profiles
      - name: Bump build number
        script: |
          cd $CM_BUILD_DIR
          # Use Codemagic's monotonically-increasing BUILD_NUMBER until an App Store listing exists.
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --project "AnchorPoint.xcodeproj" \
            --scheme "AnchorPoint"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Uncomment once the App Store listing is filled in and you're ready to submit for review:
        # submit_to_app_store: true
        # release_type: AFTER_APPROVAL
